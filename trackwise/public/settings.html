<!DOCTYPE html>
<html>
<head>
<title>Settings</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="card">
    <h2>Settings</h2>
    <input id="susername" placeholder="Username">
    <input id="semail" placeholder="Email" disabled readonly style="background-color: #e0e0e0; cursor: not-allowed;">

    <button class="btn-secondary" onclick="window.location='index.html'">Back to Dashboard</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
