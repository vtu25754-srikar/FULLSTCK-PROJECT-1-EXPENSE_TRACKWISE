<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="card">
    <h2>Sign Up</h2>
    <input id="rusername" placeholder="Username">

  </div>
</div>
<script src="script.js"></script>
</body>
</html>
