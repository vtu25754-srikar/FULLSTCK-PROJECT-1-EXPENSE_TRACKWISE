<!DOCTYPE html>
<html>
<head>
<title>TrackWise Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
<div class="header">
  <h1>TrackWise</h1>
  <div class="header-info">
    <span id="username"></span>
  </div>
  <div class="header-buttons">
    <a href="settings.html"><button class="btn-settings">Settings</button></a>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="dashboard-container">
  <div class="card-section">
    <h2>Add Expense</h2>
    <div class="form-row">
      <input id="title" placeholder="Title">
      <input id="amount" type="number" placeholder="Amount">
      <input id="date" type="date">
      <select id="category">
        <option value="">Select Category</option>
      </select>
    </div>
    <button class="btn-add-expense" onclick="addExpense()">+ Add Expense</button>
  </div>

  <div class="card-section">
    <h2>All Expenses</h2>
    <div id="warning" class="warning-banner"></div>
    <div class="expense-stats">
      <span>Monthly Limit: ₹<span id="limit"></span></span>
      <span>Total Spent: ₹<span id="total"></span></span>
    </div>
    <table id="expenseTable" class="expense-table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Amount</th>
          <th>Date</th>
          <th>Category</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="expenseTableBody">
      </tbody>
    </table>
  </div>
</div>

<!-- Edit Expense Modal -->
<div id="editModal" class="modal" onclick="closeEditModalOnBackdrop(event)">
  <div class="modal-content">
    <span class="close" onclick="closeEditModal()">&times;</span>
    <h2>Edit Expense</h2>
    <input id="editTitle" placeholder="Title">
    <input id="editAmount" type="number" placeholder="Amount">
    <input id="editDate" type="date">
    <select id="editCategory">
      <option value="">Select Category</option>
    </select>
    <button class="btn-primary" onclick="saveExpense()">Save Changes</button>
    <button class="btn-secondary" onclick="closeEditModal()">Cancel</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
